version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: sms-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: smart_media
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5
    profiles: ["dev", "test", "prod"]

  redis:
    image: redis:7.2-alpine
    container_name: sms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
    profiles: ["dev", "test", "prod"]

  mongodb:
    image: mongo:7.0
    container_name: sms-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      retries: 5
    profiles: ["dev", "test", "prod"]

  backend:
    build: ./backend
    container_name: sms-backend
    ports:
      - "8000:8000"
    environment:
      MYSQL_URL: mysql+asyncmy://root:${MYSQL_ROOT_PASSWORD:-root123}@mysql:3306/smart_media
      REDIS_URL: redis://redis:6379/0
      MONGODB_URL: mongodb://mongodb:27017
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      QWEN_API_URL: ${QWEN_API_URL:-https://dashscope.aliyuncs.com/api/v1}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-in-prod}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    profiles: ["dev"]

  backend-test:
    build: ./backend
    container_name: sms-backend-test
    environment:
      MYSQL_URL: mysql+asyncmy://root:${MYSQL_ROOT_PASSWORD:-root123}@mysql:3306/smart_media
      REDIS_URL: redis://redis:6379/0
      MONGODB_URL: mongodb://mongodb:27017
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      JWT_SECRET_KEY: test-secret
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    profiles: ["test"]

  backend-prod:
    build: ./backend
    container_name: sms-backend-prod
    restart: always
    environment:
      MYSQL_URL: mysql+asyncmy://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/smart_media
      REDIS_URL: redis://redis:6379/0
      MONGODB_URL: mongodb://mongodb:27017
      QWEN_API_KEY: ${QWEN_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
    command: >
      sh -c "alembic upgrade head &&
             gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:8000"
    profiles: ["prod"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sms-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    command: npm run dev -- --host 0.0.0.0
    profiles: ["dev"]

  frontend-prod:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: sms-frontend-prod
    profiles: ["prod"]

  nginx:
    image: nginx:alpine
    container_name: sms-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    profiles: ["dev", "test", "prod"]

volumes:
  mysql_data:
  redis_data:
  mongo_data:
